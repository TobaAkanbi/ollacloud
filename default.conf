server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml application/rss+xml font/woff2;

    # ---- security headers (inherited where no nested add_header overrides) ----
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com blob:; font-src 'self' https://fonts.gstatic.com blob: data:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' blob:; worker-src blob:; connect-src 'self' blob: https:; frame-src 'self' blob: https://www.youtube.com https://www.youtube-nocookie.com https://cal.com https://*.cal.com; base-uri 'self'; form-action 'self'" always;

    # ---- hero bundle: self-contained, needs full blob: freedom ----
    location = /ollacloudhero.html {
        expires -1;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self' blob: data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://unpkg.com; style-src 'self' 'unsafe-inline' blob: data: https://fonts.googleapis.com https:; font-src 'self' blob: data: https://fonts.gstatic.com https:; img-src 'self' blob: data: https:; connect-src 'self' blob: data: https:; worker-src blob: 'self'; frame-src 'self' blob: https:;" always;
    }

    # ---- suppress favicon 404 ----
    location = /favicon.ico { access_log off; log_not_found off; return 204; }

    # ---- health check (for Docker / Kubernetes probes) ----
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- clean URLs: /pricing -> pricing.html ----
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ---- caching (uses `expires` only, so security headers above are inherited) ----
    # HTML is unhashed, so always revalidate to avoid serving stale pages.
    location ~* \.html$        { expires -1; }
    # CSS/JS are unhashed too — short cache with revalidation.
    location ~* \.(css|js)$    { expires 1h; }
    # Fonts/images rarely change — cache longer.
    location ~* \.(svg|png|jpe?g|gif|ico|webp|woff2?)$ { expires 7d; }
}
