services:
  web:
    build: .
    image: olla-cloud-web:latest
    container_name: olla-cloud
    ports:
      - "8080:80"          # browse at http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
