apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollacloud
  labels:
    app: ollacloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollacloud
  template:
    metadata:
      labels:
        app: ollacloud
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: ollacloud
          image: toba1234/ollacloud:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ollacloud
  labels:
    app: ollacloud
spec:
  selector:
    app: ollacloud
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
